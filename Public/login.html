			<h1 class="page-title1 fu2">Login To Your Account</h1>
		  </div>

                    <form id="loginForm">

                        <div style="margin-bottom: 20px;">
                            <label for="loginEmail" class="form-label"> Email Address: </label>
                            <input type="email" class="form-control" id="loginEmail" 
                                   placeholder="Email" style="width: 100%;" required>
                        </div>
                        
                        <div style = "margin-bottom: 20px">
                            <label for = "password" class = "form-label"> Password: </label>
                            <input type = "password" class = "form-control" id = "password" placeholder = "Enter your password" style = "width: 100%;" required>
                        </div>

                        <button type="submit" class="btn-moss" style="width: 100%; padding: 12px; font-size: 1rem; cursor: pointer;"> Login </button>
                        
                        <!-- Link to Register -->
                        <div style="text-align: center; margin-top: 20px;">
                            <a href="register.html" style="color: var(--moss); text-decoration: none; font-weight: 600;">

                        </div>
                    </form>
