<div class="container mt-4">
    <h1 class="page-title">Budget Management</h1>
    <hr>
</div>

<div class="container mt-5">

    <!-- SET BUDGET -->
    <div class="section-card fu">
        <div class="section-head">
            <h2>Set Monthly Budget</h2>
        </div>
        <div class="section-body">
            <form id="budgetForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select id="budgetCategory" class="form-control">
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Budget Amount (RM)</label>
                    <input type="number" id="budgetAmount" class="form-control" required>
                </div>
                <div class="col-12">
                    <button class="btn-moss">Save Budget</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADD EXPENSE -->
    <div class="section-card fu2">
        <div class="section-head">
            <h2>Add Expense</h2>
        </div>
        <div class="section-body">
            <form id="expenseForm" class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="expenseTitle" class="form-control" placeholder="Expense title" required>
                </div>
                <div class="col-md-3">
                    <input type="number" id="expenseAmount" class="form-control" placeholder="Amount (RM)" required>
                </div>
                <div class="col-md-3">
                    <select id="expenseCategory" class="form-control">
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn-auburn w-100">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- EXPENSE TABLE -->
    <div class="section-card fu3">
        <div class="section-head">
            <h2>Expense List</h2>
        </div>
        <div class="section-body">
            <table class="fz-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Amount (RM)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expenseTable"></tbody>
            </table>
        </div>
    </div>

    <!-- SUMMARY -->
    <div class="section-card">
        <div class="section-head">
            <h2>Budget vs Actual Summary</h2>
        </div>
        <div class="section-body" id="summarySection">
        </div>
    </div>

</div>
