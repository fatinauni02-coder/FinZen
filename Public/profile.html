<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FinZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="topnav"> 
		<a class="nav-brand" href="index.html">FinZen</a>
			<button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
				<span></span>
				<span></span>
				<span></span>
			</button>

		<div class="nav-links" id="navLinks">
			<a href="index.html">Home</a>
			<a href="budget.html">Budget</a>
			<a href="savings.html">Savings</a>
			<a href="tips.html">Tips</a>
			<a href="profile.html" class="active">Profile</a>
			<a href="admin.html">Admin</a>
			<a href="login.html" class="btn-login">Login</a>
		</div>
	</nav>

    <!-- PAGE CONTENT -->
    <div class="container mt-4">

        <h1 class="page-title">Profile Management</h1>
        <hr>

        <!-- FIX: wrapped in row so pic and form sit side by side -->
        <div class="row mt-4">

            <!-- Left: Profile Picture & Info -->
            <div class="col-md-4 text-center">
                <img src="mrbean.png" class="img-thumbnail mb-3" alt="Profile Picture" style="width: 150px; height: 150px; object-fit: cover;">
                <h3 id="userName">John Doe</h3>
                <p id="userEmail">john@email.com</p>
                <p id="userPhone">012-3456789</p>
                <p id="financialSummary">Savings: RM10,000 | Active Goals: 4</p>
            </div>

            <!-- Right: Edit Form -->
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">

                    <h5 style="color: #3C5227; margin-bottom: 15px;">Edit Profile</h5>

                    <form id="profileForm">
                        <input class="form-control mb-2" id="nameInput" placeholder="Name">
                        <input class="form-control mb-2" id="emailInput" placeholder="Email">
                        <input class="form-control mb-2" id="phoneInput" placeholder="Phone">
                        <input class="form-control mb-2" id="passwordInput" type="password" placeholder="New Password">

                        <button class="btn btn-primary">Update</button>
						<a href="manageaccount.html" class="btn btn-primary ms-2">Manage Account</a>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <footer>
        <p style="margin: 0;">© 2026 FinZen &nbsp;·&nbsp; WIF2003 Web Programming &nbsp;·&nbsp; Team 10</p>
    </footer>
	
	<script>
	  document.getElementById('navToggle').addEventListener('click', function() {
		document.getElementById('navLinks').classList.toggle('open');
	  });
	</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
