	<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <body>
        <nav class="topnav">
            <a href="index.html" class="nav-brand">FinZen</a>
            
            <div class="nav-links">
                <a href="index.html">Home</a>

            </div>
        </nav>
        
        <div class="page-header">
		  <div class="container">
			<h1 class="page-title1 fu2">Create An Account</h1>
		  </div>
		</div>
        
        <main>
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-8">  <!-- change 8 to bigger number for wider -->
					<div class="section-card" style="padding: 0;">
                <div class="section-head">
                    <h2>Register New Account</h2>
                </div>
                
                <div class="section-body">
                    <h2 style="font-family: 'DM Serif Display', serif; color: var(--moss); margin-bottom: 20px; font-size: 1.5rem;">Sign up now!</h2>
                    
                    <form id="registerForm">

                        <div style="margin-bottom: 20px;">
                            <label for="myName" class="form-label">* Full Name:</label>
                            <input type="text" class="form-control" id="myName" placeholder="e.g., Ahmad Ali" style="width: 100%;" required>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label for="myEmail" class="form-label">* Email Address:</label>
                            <input type="email" class="form-control" id="myEmail" placeholder="ahmadali@gmail.com" style="width: 100%;" required>
                        </div>

                        <div style="margin-bottom: 25px;">
                            <label for="myPassword" class="form-label">* Password:</label>
                            <input type="password" class="form-control" id="myPassword" placeholder="Minimum 8 characters" style="width: 100%;" required>
                        </div>

                        <div style="margin-bottom: 25px;">
                            <label for="myConfirmPassword" class="form-label">* Confirm Password:</label>
                            <input type="password" class="form-control" id="myConfirmPassword" placeholder="Re-enter password" style="width: 100%;" required>
                        </div>
                        
                        <button type="submit" class="btn-moss" style="width: 100%; padding: 12px; font-size: 1rem; cursor: pointer;">Sign Up</button>
                        
                        <div style="text-align: center; margin-top: 20px;">
                            <a href="login.html" style="color: var(--moss); text-decoration: none; font-weight: 600;"> I already have an account </a>
                        </div>
                    
                    </form>
                </div>
            </div>
        </main>
		
		<!-- FOOTER -->

    </body>
</html>
