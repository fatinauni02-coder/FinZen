<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tips.css">
	<link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
	<nav class="topnav"> 
		<a class="nav-brand" href="index.html">FinZen</a>
			<button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
				<span></span>
				<span></span>
				<span></span>
			</button>

		<div class="nav-links" id="navLinks">
			<a href="index.html">Home</a>
			<a href="budget.html">Budget</a>
			<a href="savings.html">Savings</a>
			<a href="tips.html" class="active">Tips</a>
			<a href="profile.html">Profile</a>
			<a href="admin.html">Admin</a>
			<a href="login.html" class="btn-login">Login</a>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="page-header">
			<div class="page-container">
				<h1 class="page-title">Financial Tips</h1>
			</div>
		</div>

        <h3>Browse Financial Tips</h3>

        <div class="mb-3">
            <label for="searchInput" class="form-label">Search tips:</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Search by title or content">
        </div>

        <div class="mb-3">
            <button class="btn btn-success btn-sm filter-btn" data-category="All">All</button>
            <button class="btn btn-outline-success btn-sm filter-btn" data-category="Saving">Saving</button>
            <button class="btn btn-outline-success btn-sm filter-btn" data-category="Budgeting">Budgeting</button>
            <button class="btn btn-outline-success btn-sm filter-btn" data-category="Spending">Spending</button>
            <button class="btn btn-outline-success btn-sm filter-btn" data-category="Investing">Investing</button>
        </div>

        <div class="row" id="tipsContainer">

        </div>

        <hr>

        <h3>Saved Favourite Tips</h3>
        <p>Saved tips will appear here.</p>

        <div class="row" id="favouriteContainer">
            <p class="text-muted">No favourite tips saved yet.</p>
        </div>

        <hr>

        <h3>Submit Your Own Tip</h3>

        <form id="tipForm" class="mb-5">
            <div class="mb-3">
                <label for="tipTitle" class="form-label">Tip Title</label>
                <input type="text" id="tipTitle" class="form-control">
            </div>

            <div class="mb-3">
                <label for="tipCategory" class="form-label">Category</label>
                <select id="tipCategory" class="form-select">
                    <option value="">Choose category</option>
                    <option value="Saving">Saving</option>
                    <option value="Budgeting">Budgeting</option>
                    <option value="Spending">Spending</option>
                    <option value="Investing">Investing</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="tipContent" class="form-label">Tip Content</label>
                <textarea id="tipContent" class="form-control" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-success">Submit Tip</button>

            <p id="formMessage" class="mt-3"></p>
        </form>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p style="margin: 0;">© 2026 FinZen &nbsp;·&nbsp; WIF2003 Web Programming &nbsp;·&nbsp; Team 10</p>
    </footer>
	
	<script>
	  document.getElementById('navToggle').addEventListener('click', function() {

	  });
	</script>

    <script src="tips.js"></script>
</body>
</html>
